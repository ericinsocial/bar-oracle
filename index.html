<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bar Oracle</title>

<style>

body{
    margin:0;
    background:#111;
    color:white;
    font-family:sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:90%;
    max-width:500px;
    text-align:center;
}

h1{
    margin-bottom:30px;
}

.btn{
    display:block;
    width:100%;
    margin:15px 0;
    padding:18px;
    font-size:20px;
    border:none;
    border-radius:12px;
    cursor:pointer;
}

.cocktail{
    background:#d4af37;
}

.whisky{
    background:#8b5e3c;
    color:white;
}

</style>

</head>

<body>

<div class="card">

<h1>🍸 今晚想喝什麼？</h1>

<button class="btn cocktail">
調酒 Cocktail
</button>

<button class="btn whisky">
純飲 Whisky
</button>

</div>

</body>

</html>
